<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cristal Case</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold2: #FFA500;
    --blue: #00CFFF;
    --purple: #A855F7;
    --green: #22C55E;
    --red: #EF4444;
    --bg: #080C14;
    --bg2: #0D1320;
    --bg3: #111827;
    --card: #0F1929;
    --border: rgba(255,255,255,0.07);
    --text: #E2E8F0;
    --text2: #8899AA;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(0,207,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,207,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(168,85,247,0.12) 0%, transparent 70%);
  }

  /* ── HEADER ── */
  .header {
    position: relative; z-index: 10;
    padding: 16px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(8,12,20,0.8);
    backdrop-filter: blur(12px);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 16px rgba(255,165,0,0.4);
  }
  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px; font-weight: 700; letter-spacing: 1px;
    background: linear-gradient(90deg, #fff 0%, var(--gold) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .balance-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.25);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 700;
    color: var(--gold);
    transition: all 0.3s;
  }
  .balance-pill.pulse { animation: balancePulse 0.4s ease; }
  @keyframes balancePulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); box-shadow: 0 0 20px rgba(255,215,0,0.5); }
  }

  /* ── NAV ── */
  .nav {
    position: relative; z-index: 10;
    display: flex; gap: 4px;
    padding: 12px 16px;
    background: rgba(8,12,20,0.6);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex: 1; min-width: 70px;
    padding: 8px 4px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--text2);
    font-family: 'Exo 2', sans-serif;
    font-size: 11px; font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .nav-btn .nav-icon { font-size: 18px; }
  .nav-btn.active {
    background: rgba(0,207,255,0.12);
    border-color: var(--blue);
    color: var(--blue);
    box-shadow: 0 0 12px rgba(0,207,255,0.2), inset 0 0 12px rgba(0,207,255,0.05);
  }

  /* ── MAIN CONTENT ── */
  .main { position: relative; z-index: 5; padding: 16px; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── CASES ── */
  .cases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .case-card {
    position: relative; overflow: hidden;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    padding: 16px 12px;
    text-align: center;
  }
  .case-card:active { transform: scale(0.97); }
  .case-card::before {
    content: ''; position: absolute; inset: 0;
    opacity: 0; transition: opacity 0.3s;
    background: radial-gradient(circle at 50% 0%, rgba(255,215,0,0.15), transparent 70%);
  }
  .case-card:active::before { opacity: 1; }
  .case-card .shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.04) 50%, transparent 60%);
    background-size: 200% 100%;
    animation: shimmer 3s infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .case-emoji {
    font-size: 44px; display: block; margin-bottom: 8px;
    filter: drop-shadow(0 0 12px rgba(255,215,0,0.4));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)}
  }
  .case-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .case-price {
    font-size: 13px; font-weight: 600;
    color: var(--gold);
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .case-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 9px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 7px; border-radius: 6px;
    text-transform: uppercase;
  }
  .badge-standard { background: rgba(100,116,139,0.3); color: #94A3B8; border: 1px solid rgba(100,116,139,0.4); }
  .badge-premium  { background: rgba(59,130,246,0.25); color: #60A5FA; border: 1px solid rgba(59,130,246,0.4); }
  .badge-legendary{ background: rgba(234,179,8,0.25); color: #FBBF24; border: 1px solid rgba(234,179,8,0.4); }

  /* ── CASE OPEN MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(4,6,12,0.92);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 28px 24px;
    width: calc(100vw - 32px);
    max-width: 360px;
    text-align: center;
    transform: translateY(30px) scale(0.95);
    transition: transform 0.3s;
    position: relative; overflow: hidden;
  }
  .modal-overlay.show .modal { transform: translateY(0) scale(1); }
  .modal-glow {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(circle at 50% 0%, rgba(168,85,247,0.15), transparent 60%);
  }

  .modal-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px; font-weight: 700; letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .modal-subtitle { font-size: 12px; color: var(--text2); margin-bottom: 20px; }

  /* Case roll strip */
  .roll-container {
    overflow: hidden; border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
    height: 90px; position: relative; margin-bottom: 16px;
  }
  .roll-strip {
    display: flex; align-items: center;
    height: 100%; will-change: transform;
  }
  .roll-item {
    flex-shrink: 0; width: 80px; height: 80px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 4px; border-radius: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    font-size: 28px;
    transition: none;
  }
  .roll-item.winner { border-color: var(--gold); box-shadow: 0 0 20px rgba(255,215,0,0.4); }
  .roll-pointer {
    position: absolute; top: 0; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 3px; background: var(--gold);
    box-shadow: 0 0 10px var(--gold);
    pointer-events: none;
  }
  .roll-pointer::before, .roll-pointer::after {
    content: ''; position: absolute; left: 50%; transform: translateX(-50%);
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
  }
  .roll-pointer::before { top: 0; border-top: 9px solid var(--gold); }
  .roll-pointer::after { bottom: 0; border-bottom: 9px solid var(--gold); }

  /* Won item display */
  .won-item {
    display: none; flex-direction: column; align-items: center;
    padding: 16px; animation: wonAppear 0.5s ease;
  }
  .won-item.show { display: flex; }
  @keyframes wonAppear {
    from { opacity:0; transform: scale(0.7) rotate(-5deg); }
    to   { opacity:1; transform: scale(1) rotate(0deg); }
  }
  .won-emoji { font-size: 64px; margin-bottom: 8px; filter: drop-shadow(0 0 20px rgba(255,215,0,0.6)); }
  .won-name { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; }
  .won-rarity { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }
  .won-value { margin-top: 8px; font-size: 14px; color: var(--gold); font-weight: 600; }

  .rarity-Обычный   { color: #94A3B8; }
  .rarity-Редкий    { color: #60A5FA; }
  .rarity-Эпический { color: #C084FC; }
  .rarity-Легендарный { color: var(--gold); }

  /* particles canvas */
  #particles-canvas { position:fixed; inset:0; pointer-events:none; z-index:200; }

  /* ── OPEN BTN ── */
  .open-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    border: none; border-radius: 12px;
    color: #000; font-family: 'Rajdhani', sans-serif;
    font-size: 17px; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(255,165,0,0.35);
  }
  .open-btn:active { transform: scale(0.97); }
  .open-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .close-btn {
    width: 100%; padding: 11px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text2); font-family: 'Exo 2', sans-serif;
    font-size: 14px; cursor: pointer; margin-top: 10px;
    transition: all 0.2s;
  }
  .close-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  /* ── GAMES ── */
  .games-list { display: flex; flex-direction: column; gap: 12px; }
  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 16px;
    cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .game-card:active { transform: scale(0.98); }
  .game-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
  .game-icon-wrap {
    width: 50px; height: 50px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
  }
  .game-icon-slots  { background: linear-gradient(135deg, #7C3AED, #4F46E5); box-shadow: 0 4px 16px rgba(124,58,237,0.4); }
  .game-icon-coin   { background: linear-gradient(135deg, #D97706, #F59E0B); box-shadow: 0 4px 16px rgba(217,119,6,0.4); }
  .game-icon-roulette { background: linear-gradient(135deg, #DC2626, #B91C1C); box-shadow: 0 4px 16px rgba(220,38,38,0.4); }
  .game-meta { flex: 1; }
  .game-name { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .game-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .game-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 6px; text-transform: uppercase;
    background: rgba(34,197,94,0.15); color: var(--green);
    border: 1px solid rgba(34,197,94,0.3);
  }

  /* BET CONTROLS */
  .bet-controls { display: flex; gap: 8px; align-items: center; }
  .bet-input {
    flex: 1; background: rgba(0,0,0,0.3);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Exo 2', sans-serif;
    font-size: 15px; font-weight: 600;
    padding: 9px 12px; text-align: center;
    outline: none; transition: border-color 0.2s;
  }
  .bet-input:focus { border-color: var(--blue); }
  .bet-quick { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .bet-q-btn {
    padding: 5px 10px; background: rgba(0,207,255,0.08);
    border: 1px solid rgba(0,207,255,0.2);
    border-radius: 7px; color: var(--blue);
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .bet-q-btn:active { background: rgba(0,207,255,0.2); }

  /* GAME CHOICES */
  .choice-row { display: flex; gap: 8px; margin-top: 8px; }
  .choice-btn {
    flex: 1; padding: 10px;
    border: 2px solid var(--border);
    border-radius: 10px; background: transparent;
    color: var(--text2); font-family: 'Exo 2', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .choice-btn.selected-heads { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.1); }
  .choice-btn.selected-tails { border-color: var(--blue); color: var(--blue); background: rgba(0,207,255,0.1); }
  .choice-btn.selected-red   { border-color: #EF4444; color: #EF4444; background: rgba(239,68,68,0.1); }
  .choice-btn.selected-black { border-color: #94A3B8; color: #94A3B8; background: rgba(148,163,184,0.1); }
  .choice-btn.selected-green { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.1); }

  /* PLAY BTN */
  .play-btn {
    width: 100%; padding: 12px; margin-top: 10px;
    border: none; border-radius: 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 700; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s;
  }
  .play-btn-slots   { background: linear-gradient(135deg,#7C3AED,#4F46E5); color:#fff; box-shadow:0 4px 16px rgba(124,58,237,0.35); }
  .play-btn-coin    { background: linear-gradient(135deg,#D97706,#F59E0B); color:#000; box-shadow:0 4px 16px rgba(217,119,6,0.35); }
  .play-btn-roulette{ background: linear-gradient(135deg,#DC2626,#EF4444); color:#fff; box-shadow:0 4px 16px rgba(220,38,38,0.35); }
  .play-btn:active { transform: scale(0.97); }
  .play-btn:disabled { opacity:0.5; cursor:not-allowed; }

  /* GAME RESULT */
  .game-result {
    margin-top: 10px; padding: 12px;
    border-radius: 10px; text-align: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px; font-weight: 700;
    display: none; animation: resultPop 0.35s ease;
  }
  .game-result.show { display: block; }
  @keyframes resultPop {
    from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)}
  }
  .result-win  { background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.3); color:var(--green); }
  .result-lose { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:var(--red); }

  /* SLOTS DISPLAY */
  .slots-display {
    display: flex; justify-content: center; gap: 8px;
    padding: 14px; background: rgba(0,0,0,0.3);
    border: 1px solid var(--border); border-radius: 12px;
    margin-top: 10px; font-size: 36px;
  }
  .slot-reel {
    width: 60px; height: 60px;
    display: flex; align-items: center; justify-content: center;
    background: var(--card); border-radius: 10px;
    border: 1px solid var(--border);
    transition: all 0.1s;
    position: relative; overflow: hidden;
  }
  .slot-reel.spinning { animation: slotSpin 0.1s linear infinite; }
  @keyframes slotSpin { 0%{transform:translateY(0)} 50%{transform:translateY(-4px)} 100%{transform:translateY(0)} }

  /* COIN FLIP */
  .coin-display {
    display: flex; justify-content: center; margin-top: 10px;
  }
  .coin {
    width: 70px; height: 70px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; background: linear-gradient(135deg, var(--gold2), var(--gold));
    box-shadow: 0 4px 20px rgba(255,165,0,0.4);
    transition: all 0.1s;
  }
  .coin.flipping { animation: coinFlip 0.8s linear; }
  @keyframes coinFlip {
    0%,100%{transform:rotateY(0)} 50%{transform:rotateY(90deg) scale(0.8)}
  }

  /* ROULETTE DISPLAY */
  .roulette-display { display: flex; justify-content: center; margin-top: 10px; }
  .roulette-wheel {
    width: 70px; height: 70px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    background: conic-gradient(#DC2626 0% 49%, #1F2937 49% 97%, #16A34A 97% 100%);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: all 0.1s;
  }
  .roulette-wheel.spinning { animation: rouletteSpin 1.2s cubic-bezier(0.17,0.67,0.38,1); }
  @keyframes rouletteSpin { 0%{transform:rotate(0)} 100%{transform:rotate(1440deg)} }

  /* ── INVENTORY ── */
  .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .inv-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 10px;
    text-align: center; position: relative; overflow: hidden;
    transition: transform 0.2s;
  }
  .inv-item:active { transform: scale(0.97); }
  .inv-emoji { font-size: 36px; display: block; margin-bottom: 6px; }
  .inv-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .inv-rarity { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .inv-sell-btn {
    width: 100%; padding: 6px;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 7px; color: var(--red);
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .inv-sell-btn:active { background: rgba(239,68,68,0.25); }
  .inv-value { font-size: 12px; color: var(--gold); margin-bottom: 6px; font-weight: 600; }

  /* ── TOP ── */
  .top-list { display: flex; flex-direction: column; gap: 8px; }
  .top-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    transition: transform 0.15s;
  }
  .top-rank {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px; font-weight: 700; width: 36px; text-align: center;
  }
  .top-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    flex-shrink: 0;
  }
  .top-name { flex: 1; font-weight: 600; font-size: 15px; }
  .top-balance { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: var(--gold); }

  /* ── EMPTY ── */
  .empty-state {
    text-align: center; padding: 48px 24px;
    color: var(--text2); font-size: 14px; line-height: 1.8;
  }
  .empty-state .empty-icon { font-size: 52px; display: block; margin-bottom: 14px; opacity: 0.6; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: rgba(15,25,41,0.95); border: 1px solid var(--border);
    border-radius: 12px; padding: 11px 22px;
    font-size: 14px; font-weight: 600;
    z-index: 300; transition: transform 0.3s;
    white-space: nowrap; backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── LOADING ── */
  .loading-spinner {
    display: flex; justify-content: center; padding: 48px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to{ transform: rotate(360deg); } }

  /* ── LABEL ── */

</style>
</head>

<script>
// ── CONFIG ──
const API = "https://casino-bot-production-e38b.up.railway.app";
const tg = window.Telegram?.WebApp || null;
if (tg) tg.expand();

// Get user ID
let userId = null;
try {
  const params = new URLSearchParams(window.location.search);
  if (params.get('uid')) {
    userId = parseInt(params.get('uid'));
  } else if (tg?.initDataUnsafe?.user?.id) {
    userId = tg.initDataUnsafe.user.id;
  } else if (tg?.initData) {
    const p = new URLSearchParams(tg.initData);
    const u = JSON.parse(p.get('user') || '{}');
    if (u.id) userId = u.id;
  }
} catch(e) {}

if (!userId) {
  document.getElementById('main-content').innerHTML =
    '<div class="empty-state"><span class="empty-icon">⚠️</span>Открывай через кнопку в Telegram боте!</div>';
}

let userBalance = 0;
let currentTab = 'cases';
let selectedCaseId = null;
let selectedCaseData = null;
let casesCache = null;
let spinning = false;

// ── PARTICLES ──
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

function spawnParticles(x, y, color, count=30) {
  for(let i=0;i<count;i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*8,
      vy: (Math.random()-0.8)*10,
      size: Math.random()*8+3,
      color,
      alpha: 1,
      gravity: 0.25,
    });
  }
}

function animParticles() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles = particles.filter(p=>p.alpha>0.01);
  for(const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
    p.alpha -= 0.018;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  requestAnimationFrame(animParticles);
}
animParticles();

// ── TOAST ──
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = type==='win' ? 'rgba(34,197,94,0.5)' : type==='lose' ? 'rgba(239,68,68,0.5)' : 'rgba(255,255,255,0.07)';
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── BALANCE ──
async function refreshBalance() {
  if (!userId) return;
  try {
    const r = await fetch(`${API}/user/${userId}`);

    document.getElementById('balance-amount').textContent = userBalance.toLocaleString();
    const pill = document.getElementById('balance-display');
    pill.classList.add('pulse');
    setTimeout(()=>pill.classList.remove('pulse'), 400);
  } catch(e) {}
}

// ── TABS ──
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  const m = document.getElementById('main-content');
  m.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
  if (tab==='cases') renderCases();
  else if (tab==='games') renderGames();
  else if (tab==='inventory') renderInventory();
  else if (tab==='top') renderTop();
}

// ── CASES ──

  const m = document.getElementById('main-content');

    if (!casesCache) {

    const badgeNames = { standard:'Стандарт', premium:'Премиум', legendary:'Легенда' };
    m.innerHTML = `

        ${casesCache.map((c,i)=>`
          <div class="case-card" onclick="openCaseModal(${c.id})">

            <div class="case-price">💰 ${c.price}</div>
          </div>
        `).join('')}
      </div>`;
  } catch(e) {
    m.innerHTML = '<div class="empty-state"><span class="empty-icon">⚠️</span>Ошибка загрузки</div>';
  }
}

function openCaseModal(caseId) {
  const c = casesCache?.find(x=>x.id===caseId);
  if (!c) return;
  selectedCaseId = caseId;
  selectedCaseData = c;
  document.getElementById('modal-case-name').textContent = c.emoji+' '+c.name;
  document.getElementById('modal-case-price').textContent = 'Цена: 💰 '+c.price+' монет';
  document.getElementById('open-case-btn').textContent = '🎁 Открыть';
  document.getElementById('open-case-btn').disabled = false;
  document.getElementById('won-item').classList.remove('show');
  buildRollStrip([]);
  document.getElementById('case-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('case-modal').classList.remove('show');
  refreshBalance();
}

function buildRollStrip(items) {
  const strip = document.getElementById('roll-strip');
  const emojis = items.length ? items : ['📦','📦','📦','📦','📦','📦','📦','📦'];
  strip.innerHTML = emojis.map((e,i)=>`
    <div class="roll-item" id="roll-${i}">${typeof e==='object'? e.emoji : e}</div>
  `).join('');
  strip.style.transform = 'translateX(0)';
}

async function doOpenCase() {
  if (spinning) return;
  const btn = document.getElementById('open-case-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Открываем...';
  spinning = true;
  document.getElementById('won-item').classList.remove('show');

  try {
    const r = await fetch(`${API}/cases/${selectedCaseId}/open/${userId}`);
    if (!r.ok) {
      const d = await r.json();
      showToast('❌ '+d.detail, 'lose');
      btn.disabled=false; btn.textContent='🎁 Открыть'; spinning=false; return;
    }
    const d = await r.json();
    userBalance = d.new_balance;
    document.getElementById('balance-amount').textContent = userBalance.toLocaleString();

    // Animate roll
    const fakeItems = [];
    const fakeEmojis = ['🪙','🏅','🎖️','💠','🥇','🏆','💎','❤️','💙','💚','⭐'];
    for(let i=0;i<24;i++) fakeItems.push({emoji: fakeEmojis[Math.floor(Math.random()*fakeEmojis.length)]});
    fakeItems.push(d.item);
    buildRollStrip(fakeItems);

    const strip = document.getElementById('roll-strip');
    const itemW = 88; // width+margin
    const targetPos = -(itemW * fakeItems.length - itemW * 2.5);

    await new Promise(res => {
      let start = null;
      const dur = 3000;
      function step(ts) {
        if (!start) start = ts;
        const t = Math.min((ts-start)/dur, 1);
        const ease = 1-(1-t)*(1-t)*(1-t);
        strip.style.transform = `translateX(${targetPos * ease}px)`;
        if (t<1) requestAnimationFrame(step); else res();
      }
      requestAnimationFrame(step);
    });

    // Show won item
    const rarityClass = 'rarity-'+(d.item.rarity||'Обычный');
    document.getElementById('won-emoji').textContent = d.item.emoji||'🎁';
    document.getElementById('won-name').textContent = d.item.name;
    document.getElementById('won-rarity').className = 'won-rarity '+rarityClass;
    document.getElementById('won-rarity').textContent = d.item.rarity;
    document.getElementById('won-value').textContent = '💰 '+d.item.value+' монет';
    document.getElementById('won-item').classList.add('show');

    // Particles for legendary/epic
    if (['Легендарный','Эпический'].includes(d.item.rarity)) {
      const colors = d.item.rarity==='Легендарный'
        ? ['#FFD700','#FFA500','#FF8C00']
        : ['#C084FC','#A855F7','#9333EA'];
      for(let i=0;i<6;i++) setTimeout(()=>{
        spawnParticles(
          Math.random()*window.innerWidth,
          Math.random()*window.innerHeight*0.5,
          colors[Math.floor(Math.random()*colors.length)], 20
        );
      }, i*150);
    }

    btn.textContent = '🎁 Открыть ещё';
    btn.disabled = false;

  } catch(e) {
    showToast('❌ Ошибка соединения', 'lose');
    btn.disabled=false; btn.textContent='🎁 Открыть';
  }
  spinning = false;
}

function setBet(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = Math.max(10, Math.min(val, userBalance));
}

function selectCoin(c) {

  document.getElementById('btn-heads').className = 'choice-btn'+(c==='heads'?' selected-heads':'');
  document.getElementById('btn-tails').className = 'choice-btn'+(c==='tails'?' selected-tails':'');
}

let colorChoice = null;
function selectColor(c) {
  colorChoice = c;
  ['red','black','green'].forEach(x=>{
    document.getElementById('btn-'+x).className = 'choice-btn'+(c===x?' selected-'+x:'');
  });
}

async function playSlots() {
  const bet = parseInt(document.getElementById('slots-bet').value)||0;
  if (bet < 10) { showToast('❌ Минимум 10 монет','lose'); return; }
  if (bet > userBalance) { showToast('❌ Недостаточно монет','lose'); return; }

  const btn = document.getElementById('slots-play-btn');
  btn.disabled = true;

  // Animate reels
  const symbols = ['🍒','🍋','🍊','💎','7️⃣','⭐'];
  let ticks = 0;
  const anim = setInterval(()=>{
    [0,1,2].forEach(i=>{
      document.getElementById('reel'+i).textContent = symbols[Math.floor(Math.random()*symbols.length)];
    });
    ticks++;
    if(ticks>15) clearInterval(anim);
  }, 80);

  try {
    const r = await fetch(`${API}/games/slots`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({user_id:userId, bet})
    });
    const d = await r.json();
    setTimeout(()=>{
      clearInterval(anim);
      [0,1,2].forEach(i=>{ document.getElementById('reel'+i).textContent = d.result[i]; });
      userBalance = d.new_balance;
      document.getElementById('balance-amount').textContent = userBalance.toLocaleString();
      const win = d.outcome.includes('+');
      const res = document.getElementById('slots-result');
      res.textContent = d.outcome;
      res.className = 'game-result show '+(win?'result-win':'result-lose');
      if (win) spawnParticles(window.innerWidth/2, window.innerHeight*0.4, '#FFD700', 25);
      btn.disabled = false;
    }, 1300);
  } catch(e) {
    showToast('❌ Ошибка','lose');
    btn.disabled=false;
  }
}

  if (bet < 10) { showToast('❌ Минимум 10 монет','lose'); return; }

  const btn = document.getElementById('coin-play-btn');

  const coin = document.getElementById('coin-display');
  coin.classList.add('flipping');

  try {

async function sellItem(invId, btn) {
  btn.disabled = true;
  try {
    const r = await fetch(`${API}/sell`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({user_id:userId, inv_id:invId})
    });
    const d = await r.json();
    userBalance = d.new_balance;
    document.getElementById('balance-amount').textContent = userBalance.toLocaleString();
    showToast(`💰 Продано за ${d.value} монет`, 'win');
    setTimeout(()=>renderInventory(), 300);
  } catch(e) {
    showToast('❌ Ошибка продажи','lose');
    btn.disabled=false;
  }
}

// ── TOP ──
async function renderTop() {
  const m = document.getElementById('main-content');
  try {
    const r = await fetch(`${API}/top`);
    const users = await r.json();
    if (!users.length) {
      m.innerHTML = '<div class="empty-state"><span class="empty-icon">📊</span>Пока никого нет</div>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    const colors = ['#FFD700','#94A3B8','#CD7F32'];
    const avatarBg = ['linear-gradient(135deg,#FFD700,#FFA500)','linear-gradient(135deg,#94A3B8,#64748B)','linear-gradient(135deg,#CD7F32,#A0522D)'];
    m.innerHTML = `
      <div class="section-title">Топ игроков</div>
      <div class="top-list">
        ${users.map((u,i)=>`
          <div class="top-item" style="border-color:${i<3?colors[i]+'33':'rgba(255,255,255,0.07)'}">
            <div class="top-rank" style="color:${i<3?colors[i]:'#8899AA'}">${medals[i]||i+1}</div>
            <div class="top-avatar" style="background:${avatarBg[i]||'linear-gradient(135deg,#4F46E5,#7C3AED)'}">
              ${(u.username||'A').charAt(0).toUpperCase()}
            </div>
            <div class="top-name">@${u.username||'Аноним'}</div>
            <div class="top-balance">💰 ${u.balance.toLocaleString()}</div>
          </div>
        `).join('')}
      </div>`;
  } catch(e) {
    m.innerHTML = '<div class="empty-state"><span class="empty-icon">⚠️</span>Ошибка загрузки</div>';
  }
}

// ── INIT ──
async function init() {
  if (!userId) return;
  await refreshBalance();
  showTab('cases');
}

init();
</script>

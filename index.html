<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cristal Case</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root{--gold:#FFD700;--gold2:#FFA500;--blue:#00CFFF;--purple:#A855F7;--green:#22C55E;--red:#EF4444;--bg:#080C14;--bg2:#0D1320;--card:#0F1929;--border:rgba(255,255,255,0.07);--text:#E2E8F0;--text2:#8899AA;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}
  .bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,207,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,207,255,0.03) 1px,transparent 1px);background-size:40px 40px;}
  .bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(168,85,247,0.12) 0%,transparent 70%);}
  .ad-banner{position:relative;z-index:10;background:linear-gradient(90deg,rgba(168,85,247,0.1),rgba(0,207,255,0.06),rgba(168,85,247,0.1));border-bottom:1px solid rgba(168,85,247,0.2);padding:6px 14px;display:flex;align-items:center;gap:8px;overflow:hidden;}
  .ad-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 6px;border:1px solid rgba(255,255,255,0.12);border-radius:4px;color:rgba(255,255,255,0.25);flex-shrink:0;}
  .ad-ticker{flex:1;overflow:hidden;font-size:11px;color:var(--text2);}
  .ad-scroll{display:inline-block;white-space:nowrap;animation:adScroll 22s linear infinite;}
  @keyframes adScroll{0%{transform:translateX(100vw)}100%{transform:translateX(-100%)}}
  .header{position:relative;z-index:10;padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(8,12,20,0.85);backdrop-filter:blur(12px);}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 0 16px rgba(255,165,0,0.4);}
  .logo-text{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:700;letter-spacing:1px;background:linear-gradient(90deg,#fff 0%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .balance-pill{display:flex;align-items:center;gap:6px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.25);border-radius:20px;padding:6px 14px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--gold);transition:all 0.3s;}
  .balance-pill.pulse{animation:balancePulse 0.4s ease;}
  @keyframes balancePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08);box-shadow:0 0 20px rgba(255,215,0,0.5)}}
  .nav{position:relative;z-index:10;display:flex;gap:4px;padding:10px 14px;background:rgba(8,12,20,0.6);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
  .nav::-webkit-scrollbar{display:none;}
  .nav-btn{flex:1;min-width:68px;padding:7px 4px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text2);font-family:'Exo 2',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.25s;display:flex;flex-direction:column;align-items:center;gap:3px;white-space:nowrap;}
  .nav-btn .nav-icon{font-size:17px;}
  .nav-btn.active{background:rgba(0,207,255,0.12);border-color:var(--blue);color:var(--blue);box-shadow:0 0 12px rgba(0,207,255,0.2),inset 0 0 12px rgba(0,207,255,0.05);}
  .main{position:relative;z-index:5;padding:14px;}
  .section-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
  .ad-inline{background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.08);border-radius:12px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
  .ad-inline-icon{width:40px;height:40px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,rgba(168,85,247,0.3),rgba(0,207,255,0.2));display:flex;align-items:center;justify-content:center;font-size:20px;}
  .ad-inline-body{flex:1;}
  .ad-inline-badge{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:2px;}
  .ad-inline-copy{font-size:11px;color:var(--text2);line-height:1.4;}
  .ad-inline-cta{font-size:11px;font-weight:700;color:var(--blue);white-space:nowrap;flex-shrink:0;}
  .cases-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .case-card{position:relative;overflow:hidden;border-radius:16px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:transform 0.2s;padding:16px 12px;text-align:center;}
  .case-card:active{transform:scale(0.97);}
  .case-card .shimmer{position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.04) 50%,transparent 60%);background-size:200% 100%;animation:shimmer 3s infinite;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .case-emoji{font-size:44px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 12px rgba(255,215,0,0.4));animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .case-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:0.5px;margin-bottom:6px;}
  .case-price{font-size:13px;font-weight:600;color:var(--gold);display:flex;align-items:center;justify-content:center;gap:4px;}
  .case-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 7px;border-radius:6px;text-transform:uppercase;}
  .badge-standard{background:rgba(100,116,139,0.3);color:#94A3B8;border:1px solid rgba(100,116,139,0.4);}
  .badge-premium{background:rgba(59,130,246,0.25);color:#60A5FA;border:1px solid rgba(59,130,246,0.4);}
  .badge-legendary{background:rgba(234,179,8,0.25);color:#FBBF24;border:1px solid rgba(234,179,8,0.4);}
  .modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(4,6,12,0.92);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
  .modal-overlay.show{opacity:1;pointer-events:all;}
  .modal{background:var(--bg2);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:26px 22px;width:calc(100vw - 32px);max-width:360px;text-align:center;transform:translateY(30px) scale(0.95);transition:transform 0.3s;position:relative;overflow:hidden;}
  .modal-overlay.show .modal{transform:translateY(0) scale(1);}
  .modal-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 0%,rgba(168,85,247,0.15),transparent 60%);}
  .modal-title{font-family:'Rajdhani',sans-serif;font-size:21px;font-weight:700;letter-spacing:1px;margin-bottom:4px;}
  .modal-subtitle{font-size:12px;color:var(--text2);margin-bottom:18px;}
  .roll-container{overflow:hidden;border-radius:12px;border:1px solid var(--border);background:rgba(0,0,0,0.3);height:90px;position:relative;margin-bottom:14px;}
  .roll-strip{display:flex;align-items:center;height:100%;will-change:transform;}
  .roll-item{flex-shrink:0;width:80px;height:80px;display:flex;align-items:center;justify-content:center;margin:0 4px;border-radius:10px;background:var(--card);border:1px solid var(--border);font-size:28px;}
  .roll-pointer{position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);width:3px;background:var(--gold);box-shadow:0 0 10px var(--gold);pointer-events:none;}
  .roll-pointer::before,.roll-pointer::after{content:'';position:absolute;left:50%;transform:translateX(-50%);border-left:7px solid transparent;border-right:7px solid transparent;}
  .roll-pointer::before{top:0;border-top:9px solid var(--gold);}
  .roll-pointer::after{bottom:0;border-bottom:9px solid var(--gold);}
  .won-item{display:none;flex-direction:column;align-items:center;padding:14px;}
  .won-item.show{display:flex;animation:wonAppear 0.5s ease;}
  @keyframes wonAppear{from{opacity:0;transform:scale(0.7) rotate(-5deg)}to{opacity:1;transform:scale(1) rotate(0)}}
  .won-emoji{font-size:62px;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(255,215,0,0.6));}
  .won-name{font-family:'Rajdhani',sans-serif;font-size:21px;font-weight:700;}
  .won-rarity{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}
  .won-value{margin-top:8px;font-size:14px;color:var(--gold);font-weight:600;}
  .rarity-Обычный{color:#94A3B8;}.rarity-Редкий{color:#60A5FA;}.rarity-Эпический{color:#C084FC;}.rarity-Легендарный{color:var(--gold);}
  #particles-canvas{position:fixed;inset:0;pointer-events:none;z-index:200;}
  .open-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold2),var(--gold));border:none;border-radius:12px;color:#000;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(255,165,0,0.35);}
  .open-btn:active{transform:scale(0.97);}
  .open-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .close-btn{width:100%;padding:10px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--text2);font-family:'Exo 2',sans-serif;font-size:14px;cursor:pointer;margin-top:10px;}
  .games-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap;}
  .games-tabs::-webkit-scrollbar{display:none;}
  .game-tab{flex-shrink:0;padding:8px 14px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text2);font-family:'Exo 2',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .game-tab.active{background:rgba(168,85,247,0.15);border-color:var(--purple);color:var(--purple);}
  .game-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;position:relative;overflow:hidden;}
  .game-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .game-icon-wrap{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
  .game-icon-slots{background:linear-gradient(135deg,#7C3AED,#4F46E5);box-shadow:0 4px 16px rgba(124,58,237,0.4);}
  .game-icon-slots7{background:linear-gradient(135deg,#B91C1C,#7C3AED);box-shadow:0 4px 16px rgba(185,28,28,0.5);}
  .game-icon-coin{background:linear-gradient(135deg,#D97706,#F59E0B);box-shadow:0 4px 16px rgba(217,119,6,0.4);}
  .game-icon-roulette{background:linear-gradient(135deg,#DC2626,#B91C1C);box-shadow:0 4px 16px rgba(220,38,38,0.4);}
  .game-icon-mines{background:linear-gradient(135deg,#065F46,#047857);box-shadow:0 4px 16px rgba(6,95,70,0.5);}
  .game-meta{flex:1;}
  .game-name{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:0.5px;}
  .game-desc{font-size:11px;color:var(--text2);margin-top:2px;}
  .game-tag{font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:6px;text-transform:uppercase;background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
  .game-tag-hot{background:rgba(239,68,68,0.2);color:#FF6B6B;border:1px solid rgba(239,68,68,0.4);}
  .game-subtitle{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:6px;margin-top:4px;display:inline-block;}
  .subtitle-loh{background:rgba(100,116,139,0.2);color:#64748B;border:1px solid rgba(100,116,139,0.3);}
  .subtitle-pro{background:rgba(239,68,68,0.15);color:#EF4444;border:1px solid rgba(239,68,68,0.3);animation:proPulse 2s ease-in-out infinite;}
  @keyframes proPulse{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 12px rgba(239,68,68,0.5)}}
  .label{font-size:11px;color:var(--text2);letter-spacing:0.5px;margin-bottom:4px;}
  .bet-controls{display:flex;gap:8px;align-items:center;}
  .bet-input{flex:1;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:15px;font-weight:600;padding:9px 12px;text-align:center;outline:none;transition:border-color 0.2s;}
  .bet-input:focus{border-color:var(--blue);}
  .bet-quick{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .bet-q-btn{padding:5px 10px;background:rgba(0,207,255,0.08);border:1px solid rgba(0,207,255,0.2);border-radius:7px;color:var(--blue);font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .bet-q-btn:active{background:rgba(0,207,255,0.2);}
  .slots-display{display:flex;justify-content:center;gap:8px;padding:12px;background:rgba(0,0,0,0.35);border:1px solid var(--border);border-radius:12px;margin-top:10px;}
  .slot-reel{width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:var(--card);border-radius:10px;border:1px solid var(--border);font-size:30px;transition:all 0.15s;}
  .slot-reel.win-reel{border-color:var(--gold);box-shadow:0 0 16px rgba(255,215,0,0.6);animation:winReel 0.4s ease;}
  .slot-reel.lose-reel{border-color:var(--red);animation:loseShake 0.5s ease;}
  @keyframes winReel{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  @keyframes loseShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  .slots7-wrap{background:linear-gradient(135deg,rgba(185,28,28,0.15),rgba(124,58,237,0.1));border:2px solid rgba(185,28,28,0.4);border-radius:14px;padding:12px 8px;margin-top:10px;position:relative;}
  .slots7-title{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:linear-gradient(90deg,#B91C1C,#7C3AED);color:#fff;font-size:9px;font-weight:700;letter-spacing:2px;padding:2px 12px;border-radius:6px;text-transform:uppercase;white-space:nowrap;}
  .slots7-display{display:flex;justify-content:center;gap:3px;}
  .slot7-reel{width:38px;height:48px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);border-radius:8px;border:1px solid rgba(185,28,28,0.3);font-size:20px;}
  .slot7-reel.win-reel{border-color:var(--gold);box-shadow:0 0 12px rgba(255,215,0,0.5);animation:winReel 0.4s ease;}
  .slot7-reel.lose-reel{border-color:var(--red);animation:loseShake 0.5s ease;}
  .coin-display{display:flex;justify-content:center;margin:10px 0;}
  .coin{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;background:linear-gradient(135deg,var(--gold2),var(--gold));box-shadow:0 4px 20px rgba(255,165,0,0.4);transition:all 0.2s;}
  .coin.flipping{animation:coinFlip 0.8s linear;}
  .coin.win-coin{box-shadow:0 0 28px rgba(255,215,0,0.9);animation:coinWin 0.5s ease;}
  .coin.lose-coin{filter:grayscale(0.7);animation:loseShake 0.5s ease;}
  @keyframes coinFlip{0%,100%{transform:rotateY(0)}50%{transform:rotateY(90deg) scale(0.8)}}
  @keyframes coinWin{0%{transform:scale(0.9)}60%{transform:scale(1.18)}100%{transform:scale(1)}}
  .choice-row{display:flex;gap:8px;margin-top:10px;}
  .choice-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:10px;background:transparent;color:var(--text2);font-family:'Exo 2',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .choice-btn.selected-heads{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.1);}
  .choice-btn.selected-tails{border-color:var(--blue);color:var(--blue);background:rgba(0,207,255,0.1);}
  .choice-btn.selected-red{border-color:#EF4444;color:#EF4444;background:rgba(239,68,68,0.1);}
  .choice-btn.selected-black{border-color:#94A3B8;color:#94A3B8;background:rgba(148,163,184,0.1);}
  .choice-btn.selected-green{border-color:var(--green);color:var(--green);background:rgba(34,197,94,0.1);}
  .roulette-table{margin-top:10px;border-radius:14px;overflow:hidden;border:2px solid #1a5c28;}
  .r-felt{background:linear-gradient(180deg,#0d4a1c 0%,#0a3d17 100%);padding:12px;}
  .r-track{display:flex;gap:3px;margin-bottom:8px;}
  .r-zero-cell{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#16a34a,#15803d);border-radius:6px 0 0 6px;width:28px;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:all 0.2s;font-weight:700;font-size:13px;color:#fff;}
  .r-zero-cell.selected-green{border-color:#fff;box-shadow:0 0 14px rgba(34,197,94,0.8);}
  .r-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;flex:1;}
  .r-num{height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;border:1px solid rgba(255,255,255,0.1);transition:all 0.15s;}
  .r-num.red-num{background:linear-gradient(135deg,#dc2626,#b91c1c);}
  .r-num.black-num{background:linear-gradient(135deg,#374151,#1f2937);}
  .r-num.highlighted{transform:scale(1.1);box-shadow:0 0 8px rgba(255,215,0,0.8);border-color:var(--gold);}
  .r-ball-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
  .r-ball{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,#bbb);box-shadow:2px 2px 6px rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.3s;}
  .r-ball.spinning{animation:ballSpin 1.4s cubic-bezier(0.17,0.67,0.38,1);}
  .r-ball.landed-red{background:radial-gradient(circle at 35% 35%,#f87171,#dc2626);box-shadow:0 0 16px rgba(220,38,38,0.8);}
  .r-ball.landed-black{background:radial-gradient(circle at 35% 35%,#6b7280,#1f2937);box-shadow:0 0 12px rgba(100,100,100,0.5);}
  .r-ball.landed-green{background:radial-gradient(circle at 35% 35%,#4ade80,#16a34a);box-shadow:0 0 16px rgba(34,197,94,0.8);}
  @keyframes ballSpin{0%{transform:rotate(0) scale(0.7);opacity:0.5}40%{transform:rotate(1080deg) scale(1.3)}100%{transform:rotate(1440deg) scale(1)}}
  .r-result-num{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;min-width:40px;text-align:center;}
  .r-bets{display:grid;grid-template-columns:28px 1fr 1fr 1fr;gap:4px;}
  .r-bet-btn{padding:10px 4px;border-radius:8px;border:none;font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;text-align:center;}
  .r-bet-btn.red-btn{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;box-shadow:0 2px 10px rgba(220,38,38,0.4);}
  .r-bet-btn.black-btn{background:linear-gradient(135deg,#374151,#1f2937);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);}
  .r-bet-btn.green-btn{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;box-shadow:0 2px 10px rgba(22,163,74,0.4);}
  .r-bet-btn.selected{transform:scale(1.05);filter:brightness(1.25);outline:2px solid rgba(255,255,255,0.6);}
  .play-btn{width:100%;padding:12px;margin-top:12px;border:none;border-radius:12px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
  .play-btn-slots{background:linear-gradient(135deg,#7C3AED,#4F46E5);color:#fff;box-shadow:0 4px 16px rgba(124,58,237,0.35);}
  .play-btn-slots7{background:linear-gradient(135deg,#B91C1C,#7C3AED);color:#fff;box-shadow:0 4px 16px rgba(185,28,28,0.4);}

let userBalance=0,casesCache=null,spinning=false,activeGame='slots',coinChoice=null,colorChoice=null,selectedCaseId=null;

function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

  try{
    const ctx=getAudio();const g=ctx.createGain();g.connect(ctx.destination);const osc=ctx.createOscillator();osc.connect(g);
    if(type==='tick'){osc.type='square';osc.frequency.value=600;g.gain.setValueAtTime(0.06,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.05);osc.start();osc.stop(ctx.currentTime+0.05);}

const canvas=document.getElementById('particles-canvas');const ctx2d=canvas.getContext('2d');let particles=[];

async function renderCases(){const m=document.getElementById('main-content');try{if(!casesCache){const r=await fetch(`${API}/cases`);casesCache=await r.json();}const badges={0:'standard',1:'premium',2:'legendary'};const badgeNames={standard:'Стандарт',premium:'Премиум',legendary:'Легенда'};m.innerHTML=`<div class="ad-inline"><div class="ad-inline-icon">🎰</div><div class="ad-inline-body"><div class="ad-inline-badge">реклама</div><div class="ad-inline-copy">RoyalDrop — кейсы с реальными призами! Новым игрокам бонус 200₽</div></div><div class="ad-inline-cta">Перейти →</div></div><div class="section-title">Выбери кейс</div><div class="cases-grid">${casesCache.map((c,i)=>`<div class="case-card" onclick="openCaseModal(${c.id})"><div class="shimmer"></div><span class="case-badge badge-${badges[i]||'standard'}">${badgeNames[badges[i]||'standard']}</span><span class="case-emoji">${c.emoji||'📦'}</span><div class="case-name">${c.name}</div><div class="case-price">💰 ${c.price}</div></div>`).join('')}</div>`;}catch(e){m.innerHTML='<div class="empty-state"><span class="empty-icon">⚠️</span>Ошибка загрузки</div>';}}

async function doOpenCase(){if(spinning)return;const btn=document.getElementById('open-case-btn');btn.disabled=true;btn.textContent='⏳ Открываем...';spinning=true;document.getElementById('won-item').classList.remove('show');try{const r=await fetch(`${API}/cases/${selectedCaseId}/open/${userId}`);if(!r.ok){const d=await r.json();showToast('❌ '+d.detail,'lose');playSound('lose');btn.disabled=false;btn.textContent='🎁 Открыть';spinning=false;return;}const d=await r.json();userBalance=d.new_balance;document.getElementById('balance-amount').textContent=userBalance.toLocaleString();const fakeEmojis=['🪙','🏅','🎖️','💠','🥇','🏆','💎','❤️','💙','💚','⭐'];const fakeItems=[];for(let i=0;i<24;i++)fakeItems.push({emoji:fakeEmojis[Math.floor(Math.random()*fakeEmojis.length)]});fakeItems.push(d.item);buildRollStrip(fakeItems);const strip=document.getElementById('roll-strip');const itemW=88;const targetPos=-(itemW*fakeItems.length-itemW*2.5);let tickCount=0;await new Promise(res=>{let start=null;const dur=3000;function step(ts){if(!start)start=ts;const t=Math.min((ts-start)/dur,1);const ease=1-(1-t)*(1-t)*(1-t);strip.style.transform=`translateX(${targetPos*ease}px)`;const newTick=Math.floor(t*22);if(newTick>tickCount){tickCount=newTick;playSound('tick');}if(t<1)requestAnimationFrame(step);else res();}requestAnimationFrame(step);});document.getElementById('won-emoji').textContent=d.item.emoji||'🎁';document.getElementById('won-name').textContent=d.item.name;document.getElementById('won-rarity').className='won-rarity rarity-'+(d.item.rarity||'Обычный');document.getElementById('won-rarity').textContent=d.item.rarity;document.getElementById('won-value').textContent='💰 '+d.item.value+' монет';document.getElementById('won-item').classList.add('show');playSound('win');if(['Легендарный','Эпический'].includes(d.item.rarity)){const colors=d.item.rarity==='Легендарный'?['#FFD700','#FFA500','#FF8C00']:['#C084FC','#A855F7','#9333EA'];for(let i=0;i<7;i++)setTimeout(()=>{spawnParticles(Math.random()*window.innerWidth,Math.random()*window.innerHeight*0.5,colors[Math.floor(Math.random()*colors.length)],22);},i*140);}btn.textContent='🎁 Открыть ещё';btn.disabled=false;}catch(e){showToast('❌ Ошибка соединения','lose');playSound('lose');btn.disabled=false;btn.textContent='🎁 Открыть';}spinning=false;}

function renderGameArea(game){const area=document.getElementById('game-area');if(!area)return;if(game==='slots')area.innerHTML=buildSlotsHTML();else if(game==='slots7')area.innerHTML=buildSlots7HTML();else if(game==='coin')area.innerHTML=buildCoinHTML();else if(game==='roulette')area.innerHTML=buildRouletteHTML();else if(game==='mines')area.innerHTML=buildMinesHTML();}
function buildSlotsHTML(){return`<div class="game-card"><div class="game-header"><div class="game-icon-wrap game-icon-slots">🎰</div><div class="game-meta"><div class="game-name">Слоты — 3 барабана</div><span class="game-subtitle subtitle-loh">для лохов 😄</span></div><span class="game-tag">x10</span></div><div class="slots-display"><div class="slot-reel" id="reel0">🎰</div><div class="slot-reel" id="reel1">🎰</div><div class="slot-reel" id="reel2">🎰</div></div><div class="label" style="margin-top:12px;">Ставка</div><div class="bet-controls"><input class="bet-input" id="slots-bet" type="number" value="100" min="10"></div><div class="bet-quick"><button class="bet-q-btn" onclick="setBet('slots-bet',10)">10</button><button class="bet-q-btn" onclick="setBet('slots-bet',100)">100</button><button class="bet-q-btn" onclick="setBet('slots-bet',500)">500</button><button class="bet-q-btn" onclick="setBet('slots-bet',Math.floor(userBalance/2))">1/2</button><button class="bet-q-btn" onclick="setBet('slots-bet',userBalance)">MAX</button></div><button class="play-btn play-btn-slots" id="slots-play-btn" onclick="playSlots()">🎰 Крутить</button><div class="game-result" id="slots-result"></div></div>`;}
function buildSlots7HTML(){return`<div class="game-card"><div class="game-header"><div class="game-icon-wrap game-icon-slots7">🎰</div><div class="game-meta"><div class="game-name">Слоты — 7 барабанов</div><span class="game-subtitle subtitle-pro">профессиональное казино 🔥</span></div><span class="game-tag game-tag-hot">x50</span></div><div class="slots7-wrap"><div class="slots7-title">ТОЛЬКО ДЛЯ СИЛЬНЫХ ДУХОМ</div><div class="slots7-display">${[0,1,2,3,4,5,6].map(i=>`<div class="slot7-reel" id="reel7-${i}">🎰</div>`).join('')}</div></div><div class="label" style="margin-top:12px;">Ставка</div><div class="bet-controls"><input class="bet-input" id="slots7-bet" type="number" value="100" min="10"></div><div class="bet-quick"><button class="bet-q-btn" onclick="setBet('slots7-bet',10)">10</button><button class="bet-q-btn" onclick="setBet('slots7-bet',100)">100</button><button class="bet-q-btn" onclick="setBet('slots7-bet',500)">500</button><button class="bet-q-btn" onclick="setBet('slots7-bet',Math.floor(userBalance/2))">1/2</button><button class="bet-q-btn" onclick="setBet('slots7-bet',userBalance)">MAX</button></div><button class="play-btn play-btn-slots7" id="slots7-play-btn" onclick="playSlots7()">🎰 Крутить</button><div class="game-result" id="slots7-result"></div></div>`;}
function buildCoinHTML(){return`<div class="game-card"><div class="game-header"><div class="game-icon-wrap game-icon-coin">🪙</div><div class="game-meta"><div class="game-name">Монетка</div><div class="game-desc">50/50 — удвой ставку!</div></div><span class="game-tag">x2</span></div><div class="coin-display"><div class="coin" id="coin-display">🪙</div></div><div class="choice-row"><button class="choice-btn" id="btn-heads" onclick="selectCoin('heads')">👑 Орёл</button><button class="choice-btn" id="btn-tails" onclick="selectCoin('tails')">✨ Решка</button></div><div class="label" style="margin-top:10px;">Ставка</div><div class="bet-controls"><input class="bet-input" id="coin-bet" type="number" value="100" min="10"></div><div class="bet-quick"><button class="bet-q-btn" onclick="setBet('coin-bet',10)">10</button><button class="bet-q-btn" onclick="setBet('coin-bet',100)">100</button><button class="bet-q-btn" onclick="setBet('coin-bet',500)">500</button><button class="bet-q-btn" onclick="setBet('coin-bet',Math.floor(userBalance/2))">1/2</button><button class="bet-q-btn" onclick="setBet('coin-bet',userBalance)">MAX</button></div><button class="play-btn play-btn-coin" id="coin-play-btn" onclick="playCoin()">🪙 Бросить</button><div class="game-result" id="coin-result"></div></div>`;}
const RED_NUMS=[1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
function buildRouletteHTML(){const nums=Array.from({length:36},(_,i)=>i+1);return`<div class="game-card"><div class="game-header"><div class="game-icon-wrap game-icon-roulette">🎡</div><div class="game-meta"><div class="game-name">Рулетка</div><div class="game-desc">Зелёный даёт x14!</div></div><span class="game-tag">x14</span></div><div class="roulette-table"><div class="r-felt"><div class="r-ball-row"><div class="r-ball" id="roulette-ball">⚪</div><div class="r-result-num" id="roulette-result-num">?</div></div><div class="r-track"><div class="r-zero-cell" id="r-zero-cell" onclick="selectColor('green')">0</div><div class="r-grid" id="r-grid">${nums.map(n=>`<div class="r-num ${RED_NUMS.includes(n)?'red-num':'black-num'}" id="rnum-${n}">${n}</div>`).join('')}</div></div><div style="height:8px;"></div><div class="r-bets"><div></div><button class="r-bet-btn red-btn" id="btn-red" onclick="selectColor('red')">🔴 x2</button><button class="r-bet-btn black-btn" id="btn-black" onclick="selectColor('black')">⚫ x2</button><button class="r-bet-btn green-btn" id="btn-green" onclick="selectColor('green')">🟢 x14</button></div></div></div><div class="label" style="margin-top:10px;">Ставка</div><div class="bet-controls"><input class="bet-input" id="roulette-bet" type="number" value="100" min="10"></div><div class="bet-quick"><button class="bet-q-btn" onclick="setBet('roulette-bet',10)">10</button><button class="bet-q-btn" onclick="setBet('roulette-bet',100)">100</button><button class="bet-q-btn" onclick="setBet('roulette-bet',500)">500</button><button class="bet-q-btn" onclick="setBet('roulette-bet',Math.floor(userBalance/2))">1/2</button><button class="bet-q-btn" onclick="setBet('roulette-bet',userBalance)">MAX</button></div><button class="play-btn play-btn-roulette" id="roulette-play-btn" onclick="playRoulette()">🎡 Крутить</button><div class="game-result" id="roulette-result"></div></div>`;}
function buildMinesHTML(){return`<div class="game-card"><div class="game-header"><div class="game-icon-wrap game-icon-mines">💣</div><div class="game-meta"><div class="game-name">Мины</div><div class="game-desc">Открывай клетки — не попади на мину!</div></div><span class="game-tag game-tag-hot">до x24</span></div><div class="label">Количество мин</div><div class="mines-settings"><button class="mines-count-btn ${minesCount===3?'active':''}" onclick="setMinesCount(3)">3 💣</button><button class="mines-count-btn ${minesCount===5?'active':''}" onclick="setMinesCount(5)">5 💣</button><button class="mines-count-btn ${minesCount===10?'active':''}" onclick="setMinesCount(10)">10 💣</button><button class="mines-count-btn ${minesCount===15?'active':''}" onclick="setMinesCount(15)">15 💣</button></div><div class="label">Ставка</div><div class="bet-controls"><input class="bet-input" id="mines-bet" type="number" value="100" min="10"></div><div class="bet-quick"><button class="bet-q-btn" onclick="setBet('mines-bet',10)">10</button><button class="bet-q-btn" onclick="setBet('mines-bet',100)">100</button><button class="bet-q-btn" onclick="setBet('mines-bet',500)">500</button><button class="bet-q-btn" onclick="setBet('mines-bet',Math.floor(userBalance/2))">1/2</button><button class="bet-q-btn" onclick="setBet('mines-bet',userBalance)">MAX</button></div><button class="play-btn play-btn-mines" id="mines-start-btn" onclick="startMines()">💣 Начать игру</button><div id="mines-game-area" style="display:none"><div class="mines-multiplier"><div><div class="mines-mult-label">Текущий множитель</div><div class="mines-mult-value" id="mines-mult">x1.00</div></div><div class="mines-potential" id="mines-potential">0 💰</div></div><div class="mines-field" id="mines-field"></div><button class="play-btn play-btn-cashout" id="mines-cashout-btn" onclick="minesCashout()" disabled>💰 Забрать выигрыш</button></div><div class="game-result" id="mines-result"></div></div>`;}
function setMinesCount(n){minesCount=n;document.querySelectorAll('.mines-count-btn').forEach((b,i)=>{b.classList.toggle('active',[3,5,10,15][i]===n);});}
async function startMines(){if(minesActive){showToast('❌ Сначала заверши текущую игру','lose');return;}const bet=parseInt(document.getElementById('mines-bet').value)||0;if(bet<10){showToast('❌ Минимум 10 монет','lose');return;}if(bet>userBalance){showToast('❌ Недостаточно монет','lose');return;}const btn=document.getElementById('mines-start-btn');btn.disabled=true;try{const r=await fetch(`${API}/games/mines/start`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,bet,mines_count:minesCount})});if(!r.ok){const d=await r.json();showToast('❌ '+d.detail,'lose');btn.disabled=false;return;}const d=await r.json();minesActive=true;openedCells=[];gameOver=false;userBalance=d.new_balance;document.getElementById('balance-amount').textContent=userBalance.toLocaleString();document.getElementById('mines-game-area').style.display='block';document.getElementById('mines-result').className='game-result';document.getElementById('mines-mult').textContent='x'+d.multiplier;document.getElementById('mines-potential').textContent='0 💰';const cashoutBtn=document.getElementById('mines-cashout-btn');if(cashoutBtn)cashoutBtn.disabled=true;renderMinesField();btn.disabled=false;}catch(e){showToast('❌ Ошибка','lose');btn.disabled=false;}}
function renderMinesField(){const field=document.getElementById('mines-field');if(!field)return;field.innerHTML='';for(let i=0;i<25;i++){const cell=document.createElement('div');cell.className='mine-cell';cell.id='cell-'+i;cell.textContent='';if(!gameOver)cell.onclick=()=>openMineCell(i);field.appendChild(cell);}}
async function openMineCell(idx){if(!minesActive||gameOver)return;if(openedCells.includes(idx))return;const cell=document.getElementById('cell-'+idx);if(!cell)return;cell.style.pointerEvents='none';try{const r=await fetch(`${API}/games/mines/open`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,cell:idx})});if(!r.ok){const d=await r.json();showToast('❌ '+d.detail,'lose');cell.style.pointerEvents='auto';return;}const d=await r.json();if(d.is_mine){cell.className='mine-cell is-mine';cell.textContent='💣';playSound('lose');gameOver=true;minesActive=false;d.all_mines.forEach(m=>{if(m!==idx){const mc=document.getElementById('cell-'+m);if(mc){mc.className='mine-cell revealed-mine';mc.textContent='💣';}}});document.querySelectorAll('.mine-cell').forEach(c=>c.style.pointerEvents='none');const res=document.getElementById('mines-result');if(res){res.textContent='💥 Бум! Ты попал на мину!';res.className='game-result show result-lose';}const cashoutBtn=document.getElementById('mines-cashout-btn');if(cashoutBtn)cashoutBtn.disabled=true;const startBtn=document.getElementById('mines-start-btn');if(startBtn)startBtn.disabled=false;showToast('💥 Взрыв! Проиграл','lose');}else{openedCells=d.opened;cell.className='mine-cell opened';cell.textContent='💎';playSound('gem');spawnParticles(cell.getBoundingClientRect().x+20,cell.getBoundingClientRect().y+20,'#34D399',8);document.getElementById('mines-mult').textContent='x'+d.multiplier;document.getElementById('mines-potential').textContent=d.potential_win+' 💰';const cashoutBtn=document.getElementById('mines-cashout-btn');if(cashoutBtn)cashoutBtn.disabled=false;}}catch(e){showToast('❌ Ошибка','lose');cell.style.pointerEvents='auto';}}
async function minesCashout(){if(!minesActive||gameOver)return;const cashoutBtn=document.getElementById('mines-cashout-btn');if(cashoutBtn)cashoutBtn.disabled=true;try{const r=await fetch(`${API}/games/mines/cashout`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId})});if(!r.ok){const d=await r.json();showToast('❌ '+d.detail,'lose');if(cashoutBtn)cashoutBtn.disabled=false;return;}const d=await r.json();minesActive=false;gameOver=true;userBalance=d.new_balance;document.getElementById('balance-amount').textContent=userBalance.toLocaleString();d.all_mines.forEach(m=>{const mc=document.getElementById('cell-'+m);if(mc){mc.className='mine-cell revealed-mine';mc.textContent='💣';}});document.querySelectorAll('.mine-cell').forEach(c=>c.style.pointerEvents='none');const res=document.getElementById('mines-result');if(res){res.textContent=`💰 Забрал x${d.multiplier} — +${d.win} монет!`;res.className='game-result show result-win';}playSound('win');spawnParticles(window.innerWidth/2,window.innerHeight*0.5,'#34D399',35);showToast(`💰 Выиграл ${d.win} монет!`,'win');const startBtn=document.getElementById('mines-start-btn');if(startBtn)startBtn.disabled=false;}catch(e){showToast('❌ Ошибка','lose');if(cashoutBtn)cashoutBtn.disabled=false;}}
function setBet(id,val){const el=document.getElementById(id);if(el)el.value=Math.max(10,Math.min(val,userBalance));}
function selectCoin(c){coinChoice=c;const bh=document.getElementById('btn-heads'),bt=document.getElementById('btn-tails');if(bh)bh.className='choice-btn'+(c==='heads'?' selected-heads':'');if(bt)bt.className='choice-btn'+(c==='tails'?' selected-tails':'');}
function selectColor(c){colorChoice=c;const zero=document.getElementById('r-zero-cell');if(zero)zero.className='r-zero-cell'+(c==='green'?' selected-green':'');const rb=document.getElementById('btn-red'),bl=document.getElementById('btn-black'),gr=document.getElementById('btn-green');if(rb)rb.className='r-bet-btn red-btn'+(c==='red'?' selected':'');if(bl)bl.className='r-bet-btn black-btn'+(c==='black'?' selected':'');if(gr)gr.className='r-bet-btn green-btn'+(c==='green'?' selected':'');}
const SYMBOLS=['🍒','🍋','🍊','💎','7️⃣','⭐'];
async function playSlots(){const bet=parseInt(document.getElementById('slots-bet').value)||0;if(bet<10){showToast('❌ Минимум 10 монет','lose');return;}if(bet>userBalance){showToast('❌ Недостаточно монет','lose');return;}const btn=document.getElementById('slots-play-btn');btn.disabled=true;let ticks=0;const anim=setInterval(()=>{[0,1,2].forEach(i=>{const el=document.getElementById('reel'+i);if(el)el.textContent=SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];});if(ticks%3===0)playSound('tick');ticks++;if(ticks>16)clearInterval(anim);},80);try{const r=await fetch(`${API}/games/slots`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,bet})});const d=await r.json();setTimeout(()=>{clearInterval(anim);const win=d.outcome.includes('+');[0,1,2].forEach(i=>{const el=document.getElementById('reel'+i);if(!el)return;el.textContent=d.result[i];el.className='slot-reel '+(win?'win-reel':'lose-reel');setTimeout(()=>{if(el)el.className='slot-reel';},700);});userBalance=d.new_balance;document.getElementById('balance-amount').textContent=userBalance.toLocaleString();const res=document.getElementById('slots-result');if(res){res.textContent=d.outcome;res.className='game-result show '+(win?'result-win':'result-lose');}if(win){playSound('win');spawnParticles(window.innerWidth/2,window.innerHeight*0.4,'#FFD700',28);}else playSound('lose');btn.disabled=false;},1400);}catch(e){showToast('❌ Ошибка','lose');btn.disabled=false;}}
async function playSlots7(){const bet=parseInt(document.getElementById('slots7-bet').value)||0;if(bet<10){showToast('❌ Минимум 10 монет','lose');return;}if(bet>userBalance){showToast('❌ Недостаточно монет','lose');return;}const btn=document.getElementById('slots7-play-btn');btn.disabled=true;let ticks=0;const anim=setInterval(()=>{[0,1,2,3,4,5,6].forEach(i=>{const el=document.getElementById('reel7-'+i);if(el)el.textContent=SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];});if(ticks%3===0)playSound('tick');ticks++;if(ticks>20)clearInterval(anim);},70);try{const r=await fetch(`${API}/games/slots7`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,bet})});const d=await r.json();setTimeout(()=>{clearInterval(anim);const win=d.outcome.includes('+');const full7=d.result;[0,1,2,3,4,5,6].forEach(i=>{const el=document.getElementById('reel7-'+i);if(!el)return;el.textContent=full7[i];el.className='slot7-reel '+(win?'win-reel':'lose-reel');setTimeout(()=>{if(el)el.className='slot7-reel';},700);});userBalance=d.new_balance;document.getElementById('balance-amount').textContent=userBalance.toLocaleString();const res=document.getElementById('slots7-result');if(res){res.textContent=d.outcome;res.className='game-result show '+(win?'result-win':'result-lose');}if(win){playSound('win');spawnParticles(window.innerWidth/2,window.innerHeight*0.4,'#FFD700',40);}else playSound('lose');btn.disabled=false;},1600);}catch(e){showToast('❌ Ошибка','lose');btn.disabled=false;}}
async function playCoin(){if(!coinChoice){showToast('❌ Выбери орёл или решку','lose');return;}const bet=parseInt(document.getElementById('coin-bet').value)||0;if(bet<10){showToast('❌ Минимум 10 монет','lose');return;}if(bet>userBalance){showToast('❌ Недостаточно монет','lose');return;}const btn=document.getElementById('coin-play-btn');btn.disabled=true;const coin=document.getElementById('coin-display');if(coin){coin.className='coin flipping';playSound('tick');}try{const r=await fetch(`${API}/games/coin`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,bet,choice:coinChoice})});const d=await r.json();setTimeout(()=>{if(coin){coin.textContent=d.result==='heads'?'👑':'✨';coin.className='coin '+(d.win?'win-coin':'lose-coin');setTimeout(()=>{if(coin)coin.className='coin';},700);}userBalance=d.new_balance;document.getElementById('balance-amount').textContent=userBalance.toLocaleString();const res=document.getElementById('coin-result');if(res){res.textContent=d.outcome;res.className='game-result show '+(d.win?'result-win':'result-lose');}if(d.win){playSound('win');spawnParticles(window.innerWidth/2,window.innerHeight*0.5,'#FFD700',22);}else playSound('lose');btn.disabled=false;},950);}catch(e){showToast('❌ Ошибка','lose');btn.disabled=false;if(coin)coin.className='coin';}}
async function playRoulette(){if(!colorChoice){showToast('❌ Выбери цвет','lose');return;}const bet=parseInt(document.getElementById('roulette-bet').value)||0;if(bet<10){showToast('❌ Минимум 10 монет','lose');return;}if(bet>userBalance){showToast('❌ Недостаточно монет','lose');return;}const btn=document.getElementById('roulette-play-btn');btn.disabled=true;const ball=document.getElementById('roulette-ball');const resNum=document.getElementById('roulette-result-num');if(ball){ball.className='r-ball spinning';ball.textContent='';playSound('tick');}if(resNum)resNum.textContent='?';document.querySelectorAll('.r-num').forEach(el=>el.classList.remove('highlighted'));try{const r=await fetch(`${API}/games/roulette`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,bet,color:colorChoice})});const d=await r.json();setTimeout(()=>{if(ball){ball.className='r-ball landed-'+d.result;ball.textContent=d.result==='red'?'🔴':d.result==='black'?'⚫':'🟢';}const nums=d.result==='green'?[0]:Array.from({length:36},(_,i)=>i+1).filter(n=>d.result==='red'?RED_NUMS.includes(n):!RED_NUMS.includes(n));const pickedNum=nums[Math.floor(Math.random()*nums.length)];if(resNum)resNum.textContent=pickedNum;if(pickedNum&&document.getElementById('rnum-'+pickedNum))document.getElementById('rnum-'+pickedNum).classList.add('highlighted');userBalance=d.new_balance;document.getElementById('balance-amount').textContent=userBalance.toLocaleString();const res=document.getElementById('roulette-result');if(res){res.textContent=d.outcome;res.className='game-result show '+(d.win?'result-win':'result-lose');}const pcol=colorChoice==='green'?'#22C55E':colorChoice==='red'?'#EF4444':'#94A3B8';if(d.win){playSound('win');spawnParticles(window.innerWidth/2,window.innerHeight*0.5,pcol,26);}else playSound('lose');btn.disabled=false;},1500);}catch(e){showToast('❌ Ошибка','lose');btn.disabled=false;}}
async function renderInventory(){const m=document.getElementById('main-content');try{const r=await fetch(`${API}/user/${userId}`);const d=await r.json();const items=d.inventory||[];if(!items.length){m.innerHTML='<div class="empty-state"><span class="empty-icon">🎒</span>Инвентарь пуст<br>Открывай кейсы!</div>';return;}m.innerHTML=`<div class="section-title">Твои предметы (${items.length})</div><div class="inv-grid">${items.map((item,i)=>`<div class="inv-item"><span class="inv-emoji">${item.emoji||'🎁'}</span><div class="inv-name">${item.name}</div><div class="inv-rarity rarity-${item.rarity}">${item.rarity}</div><div class="inv-value">💰 ${item.value}</div><button class="inv-sell-btn" onclick="sellItem(${item.inv_id||i},this)">Продать</button></div>`).join('')}</div>`;}catch(e){m.innerHTML='<div class="empty-state"><span class="empty-icon">⚠️</span>Ошибка загрузки</div>';}}
async function sellItem(invId,btn){btn.disabled=true;try{const r=await fetch(`${API}/sell`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,inv_id:invId})});const d=await r.json();userBalance=d.new_balance;document.getElementById('balance-amount').textContent=userBalance.toLocaleString();showToast(`💰 Продано за ${d.value} монет`,'win');playSound('win');setTimeout(()=>renderInventory(),300);}catch(e){showToast('❌ Ошибка продажи','lose');btn.disabled=false;}}
async function renderTop(){const m=document.getElementById('main-content');try{const r=await fetch(`${API}/top`);const users=await r.json();if(!users.length){m.innerHTML='<div class="empty-state"><span class="empty-icon">📊</span>Пока никого нет</div>';return;}const medals=['🥇','🥈','🥉'];const colors=['#FFD700','#94A3B8','#CD7F32'];const avatarBg=['linear-gradient(135deg,#FFD700,#FFA500)','linear-gradient(135deg,#94A3B8,#64748B)','linear-gradient(135deg,#CD7F32,#A0522D)'];m.innerHTML=`<div class="section-title">Топ игроков</div><div class="top-list">${users.map((u,i)=>`<div class="top-item" style="border-color:${i<3?colors[i]+'33':'rgba(255,255,255,0.07)'}"><div class="top-rank" style="color:${i<3?colors[i]:'#8899AA'}">${medals[i]||i+1}</div><div class="top-avatar" style="background:${avatarBg[i]||'linear-gradient(135deg,#4F46E5,#7C3AED)'}">${(u.username||'A').charAt(0).toUpperCase()}</div><div class="top-name">@${u.username||'Аноним'}</div><div class="top-balance">💰 ${u.balance.toLocaleString()}</div></div>`).join('')}</div>`;}catch(e){m.innerHTML='<div class="empty-state"><span class="empty-icon">⚠️</span>Ошибка загрузки</div>';}}
async function init(){if(!userId)return;await refreshBalance();showTab('cases');}
init();
</script>
</body>
